{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <h2 class="mb-4">Your Enrolled Courses 📚</h2>

    <div class="row">
        {% for e in enrolled %}
        <div class="col-md-4">
            <div class="card p-3 shadow mb-3">
                <h5>{{ e.course.title }}</h5>
                <p>{{ e.course.description }}</p>
            </div>
        </div>
        {% empty %}
            <p>No courses enrolled</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
