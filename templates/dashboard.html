{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">
    <h2>Welcome, {{ request.user.username }} 👋</h2>
    <p class="text-muted">Track your enrolled courses below</p>

    <a href="/courses/" class="btn btn-primary mt-2">Browse Courses</a>
    <a href="/my-courses/" class="btn btn-outline-primary mt-2 ms-2">My Courses</a>
</div>

<div class="container mt-5">
    <h3 class="mb-4">Your Courses 📚</h3>

    <div class="row">
        {% for e in enrolled %}
        <div class="col-md-4">
            <div class="card p-3 shadow mb-4">
                <h5>{{ e.course.title }}</h5>
            </div>
        </div>
        {% empty %}
            <p>No courses enrolled</p>
        {% endfor %}
    </div>
</div>

{% endblock %}
